<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="flex-container">
        <div class="img-container">
            <img src="./patrick-untersee-DAfuneLcUIU-unsplash.jpg" alt="sunset mountain">
            
            <div class="odin">
                <img src="./odin-lined.png" alt="Image of odin project logo" class="odin-logo">
                bruh
            </div>
        </div>

        <div class="flex-container flex-column center-vertical">
            <h1>The world contains many beautiful views. Here, you can see a plethora of them.

                Sign up now.</h1>

            <form id="form1">
                <h2>Sign up now!</h2>

                <section>
                    <div class="form-column">
                        <p>
                            <label for="firstName">FIRST NAME</label>
                            <input type="text" name="firstName" id="firstName" required>
                        </p>

                        <p>
                            <label for="email">EMAIL</label>
                            <input type="email" name="email" id="email" required>
                        </p>

                        <p>
                            <label for="password">PASSWORD</label>
                            <input type="password" name="password" id="password" required>
                        </p>
                    </div>

                    <div class="form-column">
                        <p>
                            <label for="lastName">LAST NAME</label>
                            <input type="text" name="lastName" id="lastName" required>
                        </p>

                        <p>
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" name="phone" id="phone" required>
                        </p>

                        <p>
                            <label for="confirmPass">CONFIRM PASSWORD</label>
                            <input type="password" name="confirmPass" id="confirmPass" required>
                        </p>
                    </div>
                </section>
            </form>

            <div class="flex-container flex-column create-account">
                <button type="submit" form="form1">Create Account</button>

                <p>Already have an account? <strong>Log in</strong></p>
            </div>
        </div>
    </div>
</body>

</html>
